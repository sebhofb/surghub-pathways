name: Daily Opportunity Scrape

on:
  schedule:
    # Runs every day at 7:00 AM UTC (9:00 AM Geneva / 10:00 AM EAT)
    - cron: '0 7 * * *'
  # Also allows manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run opportunity scraper
        id: scrape
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EXPO_PUBLIC_AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
          EXPO_PUBLIC_AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
          EXPO_PUBLIC_AIRTABLE_TABLE: Opportunities
        run: |
          node scripts/scrape-opportunities.mjs 2>&1 | tee /tmp/scrape-output.txt
          echo "ADDED=$(grep -c '➕ Added' /tmp/scrape-output.txt || echo 0)" >> $GITHUB_OUTPUT
          echo "SKIPPED=$(grep -c '⏭️' /tmp/scrape-output.txt || echo 0)" >> $GITHUB_OUTPUT
          echo "ERRORS=$(grep -c '❌' /tmp/scrape-output.txt || echo 0)" >> $GITHUB_OUTPUT

      - name: Send summary email
        if: always()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          ADDED: ${{ steps.scrape.outputs.ADDED }}
          SKIPPED: ${{ steps.scrape.outputs.SKIPPED }}
          ERRORS: ${{ steps.scrape.outputs.ERRORS }}
          RUN_ID: ${{ github.run_id }}
        run: |
          curl -s https://api.resend.com/emails \
            -H "Authorization: Bearer $RESEND_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{
              \"from\": \"SURGhub Pathways <onboarding@resend.dev>\",
              \"to\": [\"$NOTIFY_EMAIL\"],
              \"subject\": \"SURGhub Scrape — $ADDED added\",
              \"text\": \"SURGhub Pathways — Daily Scrape Summary\n\nAdded:   $ADDED new opportunities\nSkipped: $SKIPPED (duplicates / expired)\nErrors:  $ERRORS\n\nNew opportunities are waiting in Airtable as draft.\nReview and publish: https://airtable.com/apppYe8cZ3aLfOy7f\n\nFull log: https://github.com/sebhofb/surghub-pathways/actions/runs/$RUN_ID\n\n— SURGhub Pathways · Global Surgery Foundation\"
            }"
