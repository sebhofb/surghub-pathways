name: Daily Opportunity Scrape

on:
  schedule:
    # Runs every day at 7:00 AM UTC (9:00 AM Geneva / 10:00 AM EAT)
    - cron: '0 7 * * *'
  # Also allows manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run opportunity scraper
        id: scrape
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EXPO_PUBLIC_AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
          EXPO_PUBLIC_AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
          EXPO_PUBLIC_AIRTABLE_TABLE: Opportunities
        run: |
          node scripts/scrape-opportunities.mjs 2>&1 | tee /tmp/scrape-output.txt
          echo "ADDED=$(grep -c '➕ Added' /tmp/scrape-output.txt || echo 0)" >> $GITHUB_OUTPUT
          echo "SKIPPED=$(grep -c '⏭️' /tmp/scrape-output.txt || echo 0)" >> $GITHUB_OUTPUT
          echo "ERRORS=$(grep -c '❌' /tmp/scrape-output.txt || echo 0)" >> $GITHUB_OUTPUT

      - name: Send summary email
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.NOTIFY_EMAIL }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: SURGhub Pathways <${{ secrets.NOTIFY_EMAIL }}>
          subject: "SURGhub Scrape — ${{ steps.scrape.outputs.ADDED }} added · ${{ github.run_id }}"
          body: |
            SURGhub Pathways — Daily Scrape Summary
            ========================================
            Date:     ${{ github.event.repository.updated_at || 'scheduled' }}
            Added:    ${{ steps.scrape.outputs.ADDED }} new opportunities
            Skipped:  ${{ steps.scrape.outputs.SKIPPED }} (duplicates / expired)
            Errors:   ${{ steps.scrape.outputs.ERRORS }}

            New opportunities are waiting in Airtable as "draft".
            Review and publish them here:
            https://airtable.com/apppYe8cZ3aLfOy7f

            Full log:
            https://github.com/sebhofb/surghub-pathways/actions/runs/${{ github.run_id }}

            —
            SURGhub Pathways · Global Surgery Foundation
